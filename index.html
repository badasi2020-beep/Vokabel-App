<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🐬 Lottes Delfin-Schule</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Fredoka+One&display=swap');

  :root {
    --blue1: #AEE6F8;
    --blue2: #6DCFF6;
    --blue3: #3AAEDC;
    --pink1: #FFB6D9;
    --pink2: #FF80BB;
    --pink3: #E8479A;
    --white: #ffffff;
    --soft: #FFF0F8;
    --dark: #2a3a4a;
    --shadow: 0 8px 28px rgba(62,150,200,0.18);
    --shadow-pink: 0 6px 0 #d4368a;
    --shadow-blue: 0 6px 0 #2288bb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #AEE6F8 0%, #FFB6D9 55%, #FFC8E8 100%);
    min-height: 100vh;
    padding: 12px 12px 30px;
    color: var(--dark);
    position: relative;
    overflow-x: hidden;
  }

  /* Floating bubbles background */
  body::before {
    content: '';
    position: fixed;
    top: -60px; left: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.35) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(255,255,255,0.28) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 16px 0 8px;
    position: relative;
  }
  .dolphin-banner {
    font-size: 2.6rem;
    line-height: 1;
    margin-bottom: 4px;
    animation: swim 3s ease-in-out infinite;
  }
  @keyframes swim {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-8px) rotate(3deg); }
  }
  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.9rem;
    color: var(--white);
    text-shadow: 0 3px 0 rgba(58,130,170,0.4), 0 0 20px rgba(255,128,187,0.5);
    margin-bottom: 2px;
  }
  .subtitle {
    color: rgba(255,255,255,0.92);
    font-size: 0.88rem;
    font-weight: 700;
    margin-bottom: 14px;
  }

  /* CARDS */
  .card {
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(8px);
    border-radius: 26px;
    padding: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    border: 2px solid rgba(255,255,255,0.7);
  }

  .label {
    font-weight: 900;
    font-size: 0.95rem;
    margin-bottom: 8px;
    display: block;
    color: var(--blue3);
  }

  /* SELECTS */
  .lang-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .lang-row select {
    flex: 1;
    padding: 10px 12px;
    border: 3px solid var(--blue1);
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    outline: none;
    background: white;
    color: var(--dark);
    transition: border-color 0.2s;
  }
  .lang-row select:focus { border-color: var(--pink2); }

  /* TEXTAREA */
  #setup textarea {
    width: 100%;
    min-height: 110px;
    border: 3px solid var(--blue1);
    border-radius: 16px;
    padding: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    background: var(--soft);
  }
  #setup textarea:focus { border-color: var(--pink2); }

  /* BUTTONS */
  .btn {
    display: block;
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 20px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.25rem;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 0.5px;
  }
  .btn:active { transform: translateY(4px); }

  .btn-pink {
    background: linear-gradient(135deg, var(--pink2), var(--pink3));
    color: white;
    box-shadow: var(--shadow-pink);
  }
  .btn-pink:active { box-shadow: 0 2px 0 #d4368a; }

  .btn-blue {
    background: linear-gradient(135deg, var(--blue2), var(--blue3));
    color: white;
    box-shadow: var(--shadow-blue);
    font-size: 1.05rem;
    padding: 13px;
  }
  .btn-blue:active { box-shadow: 0 2px 0 #2288bb; }

  .btn-teal {
    background: linear-gradient(135deg, #5dd6c0, #29a99a);
    color: white;
    box-shadow: 0 6px 0 #1d857a;
  }
  .btn-teal:active { box-shadow: 0 2px 0 #1d857a; }

  /* MODE TOGGLE */
  .mode-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .mode-btn {
    flex: 1;
    padding: 11px 6px;
    border: 3px solid var(--blue1);
    border-radius: 16px;
    background: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.85rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    color: var(--dark);
  }
  .mode-btn.active {
    background: linear-gradient(135deg, var(--pink1), var(--pink2));
    border-color: var(--pink2);
    color: white;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .stat-pill {
    background: rgba(255,255,255,0.9);
    border-radius: 30px;
    padding: 6px 13px;
    font-weight: 900;
    font-size: 0.88rem;
    box-shadow: 0 3px 10px rgba(109,207,246,0.3);
    display: flex;
    align-items: center;
    gap: 4px;
    border: 2px solid rgba(255,255,255,0.8);
  }

  /* PROGRESS */
  .progress-wrap {
    background: rgba(255,255,255,0.5);
    border-radius: 30px;
    height: 14px;
    margin-bottom: 14px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.6);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue2), var(--pink2));
    border-radius: 30px;
    transition: width 0.5s ease;
    position: relative;
  }
  .progress-fill::after {
    content: '🐬';
    position: absolute;
    right: -2px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    line-height: 1;
  }

  /* QUESTION BOX */
  .question-box {
    text-align: center;
    padding: 26px 20px;
    background: linear-gradient(135deg, #6DCFF6 0%, #FF80BB 100%);
    border-radius: 24px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
    border: 3px solid rgba(255,255,255,0.5);
  }
  .question-box::before {
    content: '🐬';
    position: absolute;
    top: -10px; right: 10px;
    font-size: 2.5rem;
    opacity: 0.25;
    transform: scaleX(-1);
  }
  .question-lang {
    color: rgba(255,255,255,0.8);
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }
  .question-word {
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem;
    color: white;
    text-shadow: 0 3px 0 rgba(0,0,0,0.15);
  }

  /* CHOICES */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .choice-btn {
    padding: 14px 10px;
    border: 3px solid var(--blue1);
    border-radius: 18px;
    background: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.95rem;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.2s, background 0.2s;
    text-align: center;
    min-height: 58px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dark);
  }
  .choice-btn:active { transform: scale(0.94); }
  .choice-btn:not(:disabled):hover { border-color: var(--pink2); background: var(--soft); }
  .choice-btn.selected-correct { background: #d0f5e8; border-color: #29a99a; color: #1a6e60; }
  .choice-btn.selected-wrong { background: #ffe0ef; border-color: var(--pink3); color: #9a1060; }
  .choice-btn.reveal-correct { background: #d0f5e8; border-color: #29a99a; }
  .choice-btn:disabled { cursor: default; }

  /* TYPE INPUT */
  #answer-input {
    width: 100%;
    padding: 15px;
    border: 3px solid var(--blue1);
    border-radius: 18px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 12px;
    background: white;
  }
  #answer-input:focus { border-color: var(--pink2); }
  #answer-input.correct { border-color: #29a99a; background: #d0f5e8; }
  #answer-input.wrong { border-color: var(--pink3); background: #ffe0ef; }

  /* FEEDBACK */
  .feedback {
    display: none;
    text-align: center;
    padding: 14px 16px;
    border-radius: 18px;
    margin-bottom: 12px;
    font-size: 1.05rem;
    font-weight: 900;
    animation: popIn 0.3s ease;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: #d0f5e8; color: #1a6e60; border: 2px solid #29a99a; }
  .feedback.wrong-fb { background: #ffe0ef; color: #9a1060; border: 2px solid var(--pink3); }

  @keyframes popIn {
    0% { transform: scale(0.7); opacity: 0; }
    80% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* HINT */
  .hint-btn {
    background: none;
    border: 2px dashed var(--blue1);
    border-radius: 12px;
    padding: 8px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--blue3);
    cursor: pointer;
    margin-bottom: 12px;
    width: 100%;
    transition: all 0.2s;
  }
  .hint-btn:hover { border-color: var(--pink2); color: var(--pink3); background: var(--soft); }
  .hint-text {
    font-size: 0.9rem;
    color: var(--blue3);
    text-align: center;
    margin-bottom: 10px;
    font-weight: 700;
  }

  /* CELEBRATION */
  #celebration {
    display: none;
    text-align: center;
    padding: 28px 16px;
  }
  .confetti-row { font-size: 3rem; margin-bottom: 8px; }
  .confetti-row span { display: inline-block; animation: bounceChar 0.6s infinite alternate; }
  .confetti-row span:nth-child(2) { animation-delay: 0.15s; }
  .confetti-row span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounceChar {
    0% { transform: translateY(0) rotate(-5deg); }
    100% { transform: translateY(-14px) rotate(5deg); }
  }
  .result-name {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: var(--pink3);
    margin-bottom: 4px;
  }
  .result-score {
    font-family: 'Fredoka One', cursive;
    font-size: 3.2rem;
    background: linear-gradient(135deg, var(--blue3), var(--pink3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 6px 0;
  }
  .result-msg {
    font-size: 1rem;
    font-weight: 700;
    color: #555;
    margin-bottom: 22px;
    line-height: 1.5;
  }
  .result-stars {
    font-size: 1.6rem;
    margin-bottom: 16px;
    letter-spacing: 4px;
  }

  /* LOADING */
  .loading-dots { display: inline-flex; gap: 5px; margin-left: 6px; }
  .loading-dots span {
    width: 7px; height: 7px;
    background: white;
    border-radius: 50%;
    animation: dotBounce 0.6s infinite alternate;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dotBounce {
    0% { transform: translateY(0); opacity: 0.4; }
    100% { transform: translateY(-6px); opacity: 1; }
  }

  /* WAVE DECORATION */
  .wave {
    text-align: center;
    font-size: 1.3rem;
    margin: -6px 0 10px;
    opacity: 0.5;
    letter-spacing: 3px;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="dolphin-banner">🐬💙🩷🐬</div>
  <h1>Lottes Delfin-Schule</h1>
  <p class="subtitle">Vokabeln lernen macht Spaß! 🌊</p>
</div>

<!-- SETUP SCREEN -->
<div id="setup">
  <div class="card">
    <span class="label">🌍 Sprachen wählen</span>
    <div class="lang-row">
      <select id="lang-from">
        <option value="Deutsch">🇩🇪 Deutsch</option>
        <option value="Englisch">🇬🇧 Englisch</option>
        <option value="Französisch">🇫🇷 Französisch</option>
        <option value="Spanisch">🇪🇸 Spanisch</option>
        <option value="Italienisch">🇮🇹 Italienisch</option>
        <option value="Latein">🏛️ Latein</option>
      </select>
      <select id="lang-to">
        <option value="Englisch">🇬🇧 Englisch</option>
        <option value="Deutsch">🇩🇪 Deutsch</option>
        <option value="Französisch">🇫🇷 Französisch</option>
        <option value="Spanisch">🇪🇸 Spanisch</option>
        <option value="Italienisch">🇮🇹 Italienisch</option>
        <option value="Latein">🏛️ Latein</option>
      </select>
    </div>

    <span class="label">✏️ Vokabeln eingeben</span>
    <p style="font-size:0.78rem;color:#aaa;margin-bottom:8px;">Einfach eintippen – die KI übersetzt automatisch!</p>
    <textarea id="vocab-input" placeholder="Beispiel:&#10;Delfin, dolphin&#10;Welle&#10;Ozean, ocean&#10;schwimmen&#10;..."></textarea>
  </div>

  <div class="card">
    <span class="label">🎮 Spielmodus</span>
    <div class="mode-row">
      <button class="mode-btn active" onclick="setMode('mc')" id="mode-mc">🐬 Antwort wählen</button>
      <button class="mode-btn" onclick="setMode('type')" id="mode-type">⌨️ Eintippen</button>
    </div>
    <button class="btn btn-pink" onclick="startGame()">
      Los geht's, Lotte! 🚀
    </button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game" class="hidden">
  <div class="stats-bar">
    <div class="stat-pill">⭐ <span id="score-display">0</span></div>
    <div class="stat-pill" id="lives-pill">💙💙💙</div>
    <div class="stat-pill">🔥 <span id="streak-display">0</span></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="question-box">
    <div class="question-lang" id="q-lang">Deutsch → Englisch</div>
    <div class="question-word" id="q-word">...</div>
  </div>

  <!-- MC MODE -->
  <div id="mc-area">
    <div class="choices" id="choices-grid"></div>
  </div>

  <!-- TYPE MODE -->
  <div id="type-area" class="hidden">
    <input type="text" id="answer-input" placeholder="Deine Antwort..." autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="hint-btn" id="hint-btn" onclick="showHint()">💡 Tipp zeigen (−1 Punkt)</button>
    <div class="hint-text hidden" id="hint-text"></div>
    <button class="btn btn-pink" id="submit-btn" onclick="checkTyped()">Prüfen ✓</button>
  </div>

  <div class="feedback" id="feedback"></div>
  <button class="btn btn-blue hidden" id="next-btn" onclick="nextQuestion()">Weiter 🐬</button>
</div>

<!-- RESULTS SCREEN -->
<div id="celebration" class="card">
  <div class="confetti-row">
    <span>🐬</span><span>⭐</span><span>🐬</span>
  </div>
  <div class="result-name">Super, Lotte!</div>
  <div class="result-score" id="result-score">0 ⭐</div>
  <div class="result-stars" id="result-stars">⭐⭐⭐</div>
  <div class="result-msg" id="result-msg">Du bist toll!</div>
  <button class="btn btn-teal" style="margin-bottom:10px;" onclick="restartSame()">Nochmal spielen 🔄</button>
  <button class="btn btn-blue" onclick="backToSetup()">Neue Vokabeln 📝</button>
</div>

<script>
  let vocabPairs = [];
  let currentIndex = 0;
  let score = 0;
  let lives = 3;
  let streak = 0;
  let gameMode = 'mc';
  let questions = [];
  let answered = false;
  let hintShown = false;

  function setMode(m) {
    gameMode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('mode-' + m).classList.add('active');
  }

  async function startGame() {
    const raw = document.getElementById('vocab-input').value.trim();
    if (!raw) { alert('Lotte, trag zuerst Vokabeln ein! 🐬'); return; }

    const fromLang = document.getElementById('lang-from').value;
    const toLang = document.getElementById('lang-to').value;

    const btn = document.querySelector('.btn-pink');
    btn.innerHTML = 'KI bereitet vor<span class="loading-dots"><span></span><span></span><span></span></span>';
    btn.disabled = true;

    try {
      vocabPairs = parseAndTranslate(raw, fromLang, toLang);
    } catch(e) {
      alert('Etwas ist schiefgelaufen. Bitte nochmal versuchen! 🐬');
      btn.innerHTML = 'Los geht\'s, Lotte! 🚀';
      btn.disabled = false;
      return;
    }

    if (vocabPairs.length < 2) {
      alert('Bitte mindestens 2 Vokabeln eingeben! 🐬');
      btn.innerHTML = 'Los geht\'s, Lotte! 🚀';
      btn.disabled = false;
      return;
    }

    btn.innerHTML = 'Los geht\'s, Lotte! 🚀';
    btn.disabled = false;

    questions = shuffle([...vocabPairs]);
    currentIndex = 0; score = 0; lives = 3; streak = 0;

    document.getElementById('setup').classList.add('hidden');
    document.getElementById('game').classList.remove('hidden');
    document.getElementById('celebration').style.display = 'none';

    document.getElementById('q-lang').textContent =
      document.getElementById('lang-from').value + ' → ' + document.getElementById('lang-to').value;

    renderQuestion();
  }

   function parseAndTranslate(raw, fromLang, toLang) {
  const lines = raw.split("\n");
  const result = [];

  lines.forEach(line => {
    const parts = line.split(",");

    if (parts.length === 2) {
      result.push({
        from: parts[0].trim(),
        to: parts[1].trim()
      });
    } else if (parts.length === 1 && parts[0].trim() !== "") {
      // Wenn keine Übersetzung da ist, nehmen wir erstmal das gleiche Wort
      result.push({
        from: parts[0].trim(),
        to: parts[0].trim()
      });
    }
  });

  return result;
}
    const prompt = `Du bist ein freundlicher Vokabel-Assistent für ein 10-jähriges Mädchen namens Lotte, das Delfine liebt.

Der Nutzer hat folgende Eingabe gemacht (Sprache: ${fromLang}):
"${raw}"

Bitte:
1. Erkenne alle Vokabel-Paare (Format: "Wort1, Wort2" oder nur "Wort1" ohne Übersetzung)
2. Falls eine Übersetzung fehlt, übersetze das Wort von ${fromLang} nach ${toLang}
3. Gib das Ergebnis NUR als JSON zurück, ohne Erklärung, ohne Markdown-Backticks:
[{"from": "...", "to": "..."}, ...]`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || "").join("");
    const clean = text.replace(/```json|```/g, "").trim();
    return JSON.parse(clean);
  }

  function renderQuestion() {
    if (currentIndex >= questions.length || lives <= 0) {
      showResults(); return;
    }

    answered = false; hintShown = false;
    const q = questions[currentIndex];

    document.getElementById('q-word').textContent = q.from;
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('next-btn').classList.add('hidden');

    const pct = (currentIndex / questions.length) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    updateStats();

    if (gameMode === 'mc') {
      document.getElementById('mc-area').classList.remove('hidden');
      document.getElementById('type-area').classList.add('hidden');
      renderChoices(q);
    } else {
      document.getElementById('mc-area').classList.add('hidden');
      document.getElementById('type-area').classList.remove('hidden');
      const inp = document.getElementById('answer-input');
      inp.value = ''; inp.className = ''; inp.disabled = false;
      document.getElementById('submit-btn').classList.remove('hidden');
      document.getElementById('hint-btn').classList.remove('hidden');
      document.getElementById('hint-text').classList.add('hidden');
      document.getElementById('hint-text').textContent = '';
      setTimeout(() => inp.focus(), 100);
      inp.onkeydown = (e) => { if (e.key === 'Enter') checkTyped(); };
    }
  }

  function renderChoices(q) {
    const grid = document.getElementById('choices-grid');
    grid.innerHTML = '';
    const others = vocabPairs.filter(v => v.to !== q.to).map(v => v.to);
    const wrong = shuffle(others).slice(0, 3);
    shuffle([q.to, ...wrong]).forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice;
      btn.onclick = () => checkChoice(btn, choice, q.to);
      grid.appendChild(btn);
    });
  }

  function checkChoice(btn, chosen, correct) {
    if (answered) return;
    answered = true;
    document.querySelectorAll('.choice-btn').forEach(b => {
      b.disabled = true;
      if (b.textContent === correct) b.classList.add('reveal-correct');
    });
    if (chosen === correct) {
      btn.classList.remove('reveal-correct');
      btn.classList.add('selected-correct');
      onCorrect();
    } else {
      btn.classList.add('selected-wrong');
      onWrong(correct);
    }
    document.getElementById('next-btn').classList.remove('hidden');
  }

  function checkTyped() {
    if (answered) return;
    const inp = document.getElementById('answer-input');
    const userAnswer = inp.value.trim().toLowerCase();
    const correct = questions[currentIndex].to.toLowerCase();
    if (!userAnswer) return;

    answered = true;
    inp.disabled = true;
    document.getElementById('submit-btn').classList.add('hidden');
    document.getElementById('hint-btn').classList.add('hidden');

    const isCorrect = userAnswer === correct ||
      (correct.length > 4 && levenshtein(userAnswer, correct) <= 1);

    if (isCorrect) {
      inp.classList.add('correct');
      onCorrect(hintShown ? 1 : 0);
    } else {
      inp.classList.add('wrong');
      onWrong(questions[currentIndex].to);
    }
    document.getElementById('next-btn').classList.remove('hidden');
  }

  const correctMessages = [
    '🐬 Toll, Lotte!', '💙 Super gemacht!', '🌊 Wellen-Klasse!',
    '⭐ Fantastisch!', '🩷 Du rockst das!', '🐬 Delfin-stark!'
  ];
  const wrongMessages = [
    '💙 Fast! Nächstes Mal klappt\'s!', '🌊 Nicht aufgeben, Lotte!', '🐬 Delfine üben auch!'
  ];

  function onCorrect(penalty = 0) {
    streak++;
    const bonus = streak >= 3 ? 2 : 1;
    const gained = Math.max(0, bonus - penalty);
    score += gained;
    const base = correctMessages[Math.floor(Math.random() * correctMessages.length)];
    const extra = streak >= 3 ? ` Kombo x${streak}! +${gained} ⭐` : ` +${gained} ⭐`;
    showFeedback(base + extra, true);
    updateStats();
  }

  function onWrong(correct) {
    streak = 0; lives--;
    const base = wrongMessages[Math.floor(Math.random() * wrongMessages.length)];
    showFeedback(`${base} Die Antwort: "${correct}"`, false);
    updateStats();
  }

  function showFeedback(msg, ok) {
    const el = document.getElementById('feedback');
    el.textContent = msg;
    el.className = 'feedback show ' + (ok ? 'correct-fb' : 'wrong-fb');
  }

  function nextQuestion() { currentIndex++; renderQuestion(); }

  function updateStats() {
    document.getElementById('score-display').textContent = score;
    document.getElementById('streak-display').textContent = streak;
    const hearts = lives <= 0 ? '💔' :
      (lives === 1 ? '💙🤍🤍' : lives === 2 ? '💙💙🤍' : '💙💙💙');
    document.getElementById('lives-pill').textContent = hearts;
  }

  function showHint() {
    hintShown = true;
    const correct = questions[currentIndex].to;
    const hint = correct[0] + ' ' + '_ '.repeat(correct.length - 1).trim();
    document.getElementById('hint-text').textContent = '💡 Tipp: ' + hint;
    document.getElementById('hint-text').classList.remove('hidden');
    document.getElementById('hint-btn').classList.add('hidden');
  }

  function showResults() {
    document.getElementById('game').classList.add('hidden');
    const cel = document.getElementById('celebration');
    cel.style.display = 'block';

    const pct = Math.round((score / (questions.length * 2)) * 100);
    document.getElementById('result-score').textContent = score + ' ⭐';

    let stars, msg;
    if (pct >= 80) {
      stars = '⭐⭐⭐';
      msg = 'Du bist eine echte Delfin-Meisterin! 🐬💙 Mama und Papa sind bestimmt superstolz!';
    } else if (pct >= 50) {
      stars = '⭐⭐';
      msg = 'Sehr gut gemacht, Lotte! 🌊 Noch ein bisschen üben und du schaffst alles!';
    } else {
      stars = '⭐';
      msg = 'Guter Start, Lotte! 💙 Delfine üben auch jeden Tag – nochmal versuchen!';
    }
    document.getElementById('result-stars').textContent = stars;
    document.getElementById('result-msg').textContent = msg;
  }

  function restartSame() {
    questions = shuffle([...vocabPairs]);
    currentIndex = 0; score = 0; lives = 3; streak = 0;
    document.getElementById('celebration').style.display = 'none';
    document.getElementById('game').classList.remove('hidden');
    renderQuestion();
  }

  function backToSetup() {
    document.getElementById('celebration').style.display = 'none';
    document.getElementById('setup').classList.remove('hidden');
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function levenshtein(a, b) {
    const dp = Array.from({length: a.length + 1}, (_, i) =>
      Array.from({length: b.length + 1}, (_, j) => i === 0 ? j : j === 0 ? i : 0)
    );
    for (let i = 1; i <= a.length; i++)
      for (let j = 1; j <= b.length; j++)
        dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] :
          1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    return dp[a.length][b.length];
  }
</script>
